<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="weather.css">
</head>
<body>
    <div class="container">
        <h1>🌤 Weather App</h1>
        <!-- Search -->
        <div class="search-box">
            <input
                type="text"
                id="cityInput"
                placeholder="Enter city name...">
            <button id="searchBtn">
                Search
            </button>
        </div>
        <!-- Weather Card -->
        <div class="weather-card">

    <div class="main-weather">

        <h2 id="cityName">City</h2>

        <p id="description">Weather</p>

        <h1 id="temperature">--°C</h1>

    </div>

    <div class="weather-details">

        <div class="card">
            <h3> Feels Like</h3>
            <p id="feelsLike">--°C</p>
        </div>

        <div class="card">
            <h3> Humidity</h3>
            <p id="humidity">--%</p>
        </div>

        <div class="card">
            <h3> Wind Speed</h3>
            <p id="wind">-- km/h</p>
        </div>
        </div>

    </div>
        <!-- Search History -->
        <div class="history">
            <h2>Recent Searches</h2>
            <ul id="historyList">
            </ul>
        </div>
    </div>
    <script src="weather.js"></script>
</body>
</html>
